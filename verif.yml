name: CI - Vérification HTML

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test-html:
    # C'est ici que la magie opère : on cible votre machine
    runs-on: [self-hosted, linux, x64] 
    steps:
      - name: Récupération du code
        uses: actions/checkout@v3

      - name: Vérification syntaxe HTML
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: .